<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>SinterNode</title>
  <link rel="stylesheet" href="/styles.css">
</head>
<body>
  <div class="app-shell">
    <header class="topbar">
      <div>
        <h1>SinterNode</h1>
        <p>Bootstrap and node status. Use SinterServer for management.</p>
      </div>
      <div class="topbar-meta" id="topbar-meta">Loading…</div>
    </header>
    <div class="status-strip" id="status-strip" hidden></div>

    <main class="single-column">
      <section class="detail-column" aria-labelledby="detail-title">
        <div class="detail-head compact-head">
          <h2 id="detail-title">Node status</h2>
          <div class="inline-actions">
            <button class="secondary" id="refresh-button" type="button">Refresh</button>
          </div>
        </div>
        <div id="detail-pane" class="detail-pane"></div>
      </section>
    </main>
  </div>
  <script src="/app.js"></script>
</body>
</html>
