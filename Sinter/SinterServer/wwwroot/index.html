<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>SinterServer</title>
  <link rel="stylesheet" href="/styles.css">
</head>
<body>
  <div class="app-shell">
    <header class="topbar header">
      <div class="title-group">
        <div class="title-row">
          <div class="title">SinterServer</div>
          <span id="header-version" class="header-version hidden" title=""></span>
        </div>
        <div class="subtitle">Control plane for nodes, apps, and deployment actions.</div>
      </div>
      <div class="header-right">
        <button class="secondary" id="self-update-button" type="button">Update</button>
        <div class="header-selection" id="header-selection">Loading selection…</div>
        <div class="status live" id="header-status"><span class="status-dot"></span><span id="header-status-label">Loading…</span></div>
      </div>
    </header>
    <div class="toast" id="status-strip" hidden aria-live="polite" aria-atomic="true"></div>
    <div class="progress-dialog" id="progress-dialog" hidden aria-live="polite" aria-atomic="false"></div>
    <div class="dialog-layer" id="dialog-layer" hidden></div>

    <main class="columns layout server-layout" id="server-layout">
      <section class="column pane collapsible-column" id="nodes-column" aria-labelledby="nodes-title">
        <div class="column-head pane-head">
          <div class="column-head-title-group">
            <button class="secondary collapse-toggle" id="toggle-nodes-column" type="button" aria-expanded="true" aria-controls="nodes-list" title="Collapse Nodes">◂</button>
            <h2 id="nodes-title">Nodes</h2>
          </div>
          <button class="secondary" id="update-all-nodes-button" type="button">Update all</button>
          <button id="add-node-button" type="button">+</button>
        </div>
        <div class="list" id="nodes-list"></div>
      </section>

      <section class="column pane collapsible-column" id="apps-column" aria-labelledby="apps-title">
        <div class="column-head pane-head">
          <div class="column-head-title-group">
            <button class="secondary collapse-toggle" id="toggle-apps-column" type="button" aria-expanded="true" aria-controls="apps-list" title="Collapse Apps">◂</button>
            <h2 id="apps-title">Apps</h2>
          </div>
          <button id="add-app-button" type="button">+</button>
        </div>
        <div class="list" id="apps-list"></div>
      </section>

      <section class="detail-column pane detail-pane-shell" aria-labelledby="detail-title">
        <div class="detail-head pane-head">
          <h2 id="detail-title">Details</h2>
          <div class="inline-actions">
            <button class="secondary" id="show-auth-users-button" type="button">Auth users</button>
            <button class="secondary" id="refresh-button" type="button">Refresh</button>
          </div>
        </div>
        <div id="detail-pane" class="detail-pane"></div>
      </section>
    </main>
  </div>
  <script src="/app.js"></script>
</body>
</html>
