<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>SinterServer</title>
  <link rel="stylesheet" href="/styles.css">
</head>
<body>
  <div class="app-shell">
    <header class="topbar">
      <div>
        <h1>SinterServer</h1>
        <p>Basic control plane for nodes, apps, and deployment actions.</p>
      </div>
      <div class="topbar-meta" id="topbar-meta">Loading…</div>
    </header>
    <div class="status-strip" id="status-strip" hidden></div>

    <main class="columns">
      <section class="column" aria-labelledby="nodes-title">
        <div class="column-head">
          <h2 id="nodes-title">Nodes</h2>
          <button id="add-node-button" type="button">+</button>
        </div>
        <div class="list" id="nodes-list"></div>
      </section>

      <section class="column" aria-labelledby="apps-title">
        <div class="column-head">
          <h2 id="apps-title">Apps</h2>
          <button id="add-app-button" type="button">+</button>
        </div>
        <div class="list" id="apps-list"></div>
      </section>

      <section class="detail-column" aria-labelledby="detail-title">
        <div class="detail-head">
          <h2 id="detail-title">Details</h2>
          <div class="inline-actions">
            <button id="show-auth-users-button" type="button">Auth users</button>
            <button id="refresh-button" type="button">Refresh</button>
          </div>
        </div>
        <div id="detail-pane" class="detail-pane"></div>
      </section>
    </main>
  </div>
  <script src="/app.js"></script>
</body>
</html>
